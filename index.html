<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YATRA_SATHI</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        /* ── SPLASH SCREEN ── */
        .splash {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0px;
            transition: opacity 0.6s ease;
        }

        .splash.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .splash.hidden {
            display: none;
        }

        .splash-logo {
            width: 180px;
            height: 180px;
            border-radius: 28px;
            background: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: 0 8px 40px rgba(100, 120, 200, 0.15);
            opacity: 0;
            transform: scale(0.6);
            transition: opacity 0.6s ease, transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .splash-logo.show {
            opacity: 1;
            transform: scale(1);
        }

        .splash-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .splash-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 0.10em;
            color: #1a1a2e;
            margin-top: 24px;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
        }

        .splash-title span {
            color: #cc0000;
        }

        .splash-title.show {
            opacity: 1;
            transform: translateY(0);
        }

        .splash-motto {
            font-size: 0.85rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #7a7a9a;
            margin-top: 8px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
        }

        .splash-motto.show {
            opacity: 1;
            transform: translateY(0);
        }

        .splash-bar {
            width: 0px;
            height: 3px;
            background: #cc0000;
            border-radius: 2px;
            margin-top: 28px;
            transition: width 2s cubic-bezier(0.4, 0, 0.2, 1) 0.7s;
        }

        .splash-bar.grow {
            width: 180px;
        }

        /* Flying logo animation */
        .splash-logo.fly {
            transition: opacity 0.5s ease, transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), width 0.8s cubic-bezier(0.4, 0, 0.2, 1), height 0.8s cubic-bezier(0.4, 0, 0.2, 1), border-radius 0.8s ease, box-shadow 0.5s ease;
        }

        /* ── MAIN PAGE ── */
        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            background-image:
                radial-gradient(ellipse 80% 60% at 20% 10%, #eef2ff 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, #fff0f2 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, #f9f9ff 0%, transparent 70%);
            animation: bgShift 8s ease-in-out infinite alternate;
            overflow: hidden;
            position: relative;
            color: #1a1a2e;
        }

        @keyframes bgShift {
            0% {
                background-image: radial-gradient(ellipse 80% 60% at 20% 10%, #eef2ff 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 90%, #fff0f2 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 50% 50%, #f9f9ff 0%, transparent 70%);
            }

            50% {
                background-image: radial-gradient(ellipse 80% 60% at 70% 20%, #f5f0ff 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 20% 80%, #fff5f0 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 50% 50%, #f8fffc 0%, transparent 70%);
            }

            100% {
                background-image: radial-gradient(ellipse 80% 60% at 50% 80%, #f0f8ff 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 30% 20%, #fff0f5 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 50% 50%, #fffaf0 0%, transparent 70%);
            }
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, #c8c8d8 1px, transparent 1px);
            background-size: 36px 36px;
            opacity: 0.25;
            z-index: 0;
            pointer-events: none;
        }

        /* ── CARD ── */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.70);
            border: 1px solid rgba(200, 210, 255, 0.50);
            border-radius: 28px;
            padding: 52px 60px 48px;
            max-width: 520px;
            width: 92%;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 24px rgba(100, 120, 200, 0.10), 0 1px 0 rgba(255, 255, 255, 0.9) inset;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── LOGO IN CARD ── */
        .logo-wrap {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-shadow: 0 4px 20px rgba(100, 120, 200, 0.12), 0 0 0 1px rgba(200, 210, 255, 0.4);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .logo-wrap.show {
            opacity: 1;
        }

        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .title {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(2rem, 6vw, 2.8rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #1a1a2e;
            line-height: 1;
        }

        .title span {
            color: #cc0000;
        }

        .motto {
            font-size: 0.88rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #7a7a9a;
            margin: 10px 0 28px;
        }

        .divider {
            width: 44px;
            height: 2.5px;
            background: #cc0000;
            margin: 0 auto 28px;
            border-radius: 2px;
        }

        .question {
            font-size: 1rem;
            font-weight: 600;
            color: #4a4a6a;
            margin-bottom: 26px;
        }

        /* ── BUTTONS ── */
        .btn-group {
            display: flex;
            gap: 18px;
            justify-content: center;
        }

        .role-btn {
            position: relative;
            width: 170px;
            height: 62px;
            border-radius: 14px;
            border: 2.5px solid #1a3aff;
            background-color: #cc0000;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            outline: none;
        }

        .role-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 10px 28px rgba(204, 0, 0, 0.28), 0 0 0 2px #1a3aff;
        }

        .role-btn .btn-label {
            position: relative;
            z-index: 2;
            transition: opacity 0.35s ease;
            display: block;
        }

        .role-btn .btn-img {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.45s ease;
            z-index: 1;
        }

        .role-btn .btn-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.30);
        }

        .role-btn:hover .btn-img {
            opacity: 1;
        }

        .role-btn:hover .btn-label {
            opacity: 0;
        }

        #btn-driver .btn-img {
            background-image: url('driver.jpg');
        }

        #btn-passenger .btn-img {
            background-image: url('passenger.jpg');
        }

        .tag {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 0.70rem;
            letter-spacing: 0.18em;
            color: #aaaacc;
            text-transform: uppercase;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .card {
                padding: 36px 22px 32px;
            }

            .btn-group {
                flex-direction: column;
                align-items: center;
            }

            .role-btn {
                width: 100%;
            }
        }
    </style>
</head>

        <h1 class="title">YATRA<span>_</span>SATHI</h1>
        <p class="motto">The Travel Companion</p>
        <div class="divider"></div>
        <p class="question">How would you like to continue?</p>
        <div class="btn-group">
            <button class="role-btn" id="btn-driver" onclick="selectRole('driver')">
                <div class="btn-img"></div>
                <span class="btn-label">🚗 Driver</span>
            </button>
            <button class="role-btn" id="btn-passenger" onclick="selectRole('passenger')">
                <div class="btn-img"></div>
                <span class="btn-label">🧳 Passenger</span>
            </button>
        </div>
    </div>

    <p class="tag">YATRA_SATHI &mdash; Your Journey, Our Priority</p>

    <script>
        var splashLogo = document.getElementById('splashLogo');
        var splashTitle = document.getElementById('splashTitle');
        var splashMotto = document.getElementById('splashMotto');
        var splashBar = document.getElementById('splashBar');
        var splash = document.getElementById('splash');
        var mainCard = document.getElementById('mainCard');
        var cardLogo = document.getElementById('cardLogo');

        // Phase 1 — logo pops in
        setTimeout(function () {
            splashLogo.classList.add('show');
        }, 100);

        // Phase 2 — title + motto fade in
        setTimeout(function () {
            splashTitle.classList.add('show');
            splashMotto.classList.add('show');
        }, 400);

        // Phase 3 — loading bar grows
        setTimeout(function () {
            splashBar.classList.add('grow');
        }, 600);

        // Phase 4 — fly logo to card position
        setTimeout(function () {
            // Get splash logo position
            var splashRect = splashLogo.getBoundingClientRect();

            // Show card (invisible) so we can measure the cardLogo position
            mainCard.style.opacity = '0';
            mainCard.style.transform = 'translateY(0)';
            mainCard.style.transition = 'none';
            mainCard.classList.add('show');
            cardLogo.classList.add('show');

            var cardRect = cardLogo.getBoundingClientRect();

            // Reset card to invisible for final reveal
            mainCard.style.opacity = '0';
            mainCard.style.transform = 'translateY(30px)';

            // Calculate delta
            var dx = cardRect.left - splashRect.left;
            var dy = cardRect.top - splashRect.top;
            var scaleX = cardRect.width / splashRect.width;
            var scaleY = cardRect.height / splashRect.height;

            // Fade out text on splash
            splashTitle.style.transition = 'opacity 0.3s ease';
            splashMotto.style.transition = 'opacity 0.3s ease';
            splashBar.style.transition = 'opacity 0.3s ease';
            splashTitle.style.opacity = '0';
            splashMotto.style.opacity = '0';
            splashBar.style.opacity = '0';

            // Fly the splash logo to card logo position
            splashLogo.classList.add('fly');
            splashLogo.style.transform = 'scale(1) translate(' + dx + 'px, ' + dy + 'px) scale(' + scaleX + ')';
            splashLogo.style.borderRadius = '20px';
            splashLogo.style.boxShadow = '0 4px 20px rgba(100,120,200,0.12)';

        }, 2800);

        // Phase 5 — reveal main card, hide splash
        setTimeout(function () {
            // Fade out splash
            splash.classList.add('fade-out');

            // Reveal main card
            mainCard.style.transition = 'opacity 0.7s ease, transform 0.7s cubic-bezier(0.22,1,0.36,1)';
            mainCard.style.opacity = '1';
            mainCard.style.transform = 'translateY(0)';
            cardLogo.style.opacity = '1';

        }, 3500);

        // Phase 6 — remove splash from DOM
        setTimeout(function () {
            splash.classList.add('hidden');
        }, 4200);

        function selectRole(role) {
            if (role === 'driver') {
                window.location.href = 'driver-login.html';
            } else {
                window.location.href = 'passenger-login.html';
            }
        }
    </script>
